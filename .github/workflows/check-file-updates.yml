name: Check Bitbucket File Updates

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-updates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repository to read settings.yml
        uses: actions/checkout@v4

      - name: Check each Bitbucket repository for recent file updates
        id: check
        env:
          BITBUCKET_TOKEN: ${{ secrets.BITBUCKET_TOKEN }}
          BITBUCKET_ACCOUNT: ${{ secrets.BITBUCKET_ACCOUNT }}
        run: |
          OUTPUT=$(python3 .github/scripts/check_file_updates.py)
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "RESULT: SEND A NOTIFICATION"; then
            echo "notify=true" >> $GITHUB_OUTPUT
          fi

      - name: Notify via GitHub Issue
        if: steps.check.outputs.notify == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "📢 Bitbucket file update detected" \
            --body "Hey @ggenzone — one or more monitored Bitbucket files were updated in the last 2 days. Please review." \
            --repo ${{ github.repository }}
