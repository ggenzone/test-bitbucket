name: Check Bitbucket File Updates

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-updates:
    runs-on: ubuntu-latest

    steps:
      - name: Install yq
        env:
          YQ_VERSION: "v4.44.3"
        run: |
          sudo wget -qO /usr/local/bin/yq \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          wget -qO /tmp/yq_checksums.txt \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/checksums"
          EXPECTED=$(grep "yq_linux_amd64$" /tmp/yq_checksums.txt | awk '{print $1}')
          echo "${EXPECTED}  /usr/local/bin/yq" | sha256sum -c -
          sudo chmod +x /usr/local/bin/yq

      - name: Checkout this repository to read settings.yml
        uses: actions/checkout@v4

      - name: Check each Bitbucket repository for recent file updates
        env:
          BITBUCKET_TOKEN: ${{ secrets.BITBUCKET_TOKEN }}
        run: |
          set -euo pipefail

          REPO_COUNT=$(yq '.repositories | length' settings.yml)

          for i in $(seq 0 $((REPO_COUNT - 1))); do
            REPO_NAME=$(yq ".repositories[$i].name" settings.yml)
            BRANCH=$(yq ".repositories[$i].branch" settings.yml)
            FILE_COUNT=$(yq ".repositories[$i].files | length" settings.yml)

            echo "──────────────────────────────────────────"
            echo "Repository : $REPO_NAME"
            echo "Branch     : $BRANCH"

            WORKSPACE=$(echo "$REPO_NAME" | cut -d'/' -f1)
            REPO_SLUG=$(echo "$REPO_NAME" | cut -d'/' -f2)

            UPDATED=false

            for j in $(seq 0 $((FILE_COUNT - 1))); do
              FILE_PATH=$(yq ".repositories[$i].files[$j]" settings.yml)

              echo "  Checking file: $FILE_PATH"

              # Use Python for URL-encoding and all date arithmetic to keep the
              # logic consistent and avoid platform-specific shell quirks.
              RESULT=$(FILE_PATH="$FILE_PATH" BRANCH="$BRANCH" \
                WORKSPACE="$WORKSPACE" REPO_SLUG="$REPO_SLUG" \
                BITBUCKET_TOKEN="$BITBUCKET_TOKEN" \
                python3 - <<'PYEOF'
import json, os, sys, urllib.parse, urllib.request
from datetime import datetime, timezone, timedelta

file_path  = os.environ["FILE_PATH"]
branch     = os.environ["BRANCH"]
workspace  = os.environ["WORKSPACE"]
repo_slug  = os.environ["REPO_SLUG"]
token      = os.environ["BITBUCKET_TOKEN"]

encoded_path = urllib.parse.quote(file_path, safe="")
url = (
    f"https://api.bitbucket.org/2.0/repositories/"
    f"{workspace}/{repo_slug}/commits"
    f"?path={encoded_path}&include={urllib.parse.quote(branch, safe='')}&pagelen=1"
)

req = urllib.request.Request(url, headers={"Authorization": f"Bearer {token}"})
try:
    with urllib.request.urlopen(req) as resp:
        data = json.loads(resp.read())
except urllib.error.HTTPError as e:
    print(f"WARNING: HTTP {e.code} for {file_path}", file=sys.stderr)
    sys.exit(0)
except Exception as e:
    print(f"WARNING: request failed – {e}", file=sys.stderr)
    sys.exit(0)

values = data.get("values", [])
if not values:
    print(f"NO_COMMITS")
    sys.exit(0)

date_str = values[0].get("date", "")
if not date_str:
    print(f"NO_DATE")
    sys.exit(0)

commit_dt = datetime.fromisoformat(date_str.replace("Z", "+00:00"))
cutoff_dt = datetime.now(timezone.utc) - timedelta(days=2)

print(date_str)
print("RECENT" if commit_dt >= cutoff_dt else "OLD")
PYEOF
              )

              COMMIT_DATE=$(echo "$RESULT" | head -n 1)
              STATUS=$(echo "$RESULT" | tail -n 1)

              case "$COMMIT_DATE" in
                NO_COMMITS)
                  echo "    No commits found for $FILE_PATH on branch $BRANCH"
                  continue
                  ;;
                NO_DATE)
                  echo "    Could not determine commit date for $FILE_PATH"
                  continue
                  ;;
              esac

              echo "    Last commit date: $COMMIT_DATE"

              if [ "$STATUS" = "RECENT" ]; then
                echo "    → File was updated within the last 2 days"
                UPDATED=true
              else
                echo "    → File has not been updated in the last 2 days"
              fi
            done

            if [ "$UPDATED" = "true" ]; then
              echo "RESULT: SEND A NOTIFICATION"
            else
              echo "RESULT: REPOSITORY UNCHANGED"
            fi
          done
